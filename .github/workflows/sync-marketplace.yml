name: Sync version to marketplace

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - .claude-plugin/plugin.json
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check PAT exists
        run: |
          if [ -z "${{ secrets.MARKETPLACE_PAT }}" ]; then
            echo "::error::MARKETPLACE_PAT secret is not set. Add a PAT with repo scope to Settings → Secrets → Actions."
            exit 1
          fi

      - name: Checkout skills repo
        uses: actions/checkout@v4

      - name: Read version and description
        id: meta
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          DESCRIPTION=$(jq -r '.description' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "description=$DESCRIPTION" >> "$GITHUB_OUTPUT"

      - name: Checkout marketplace repo
        uses: actions/checkout@v4
        with:
          repository: whats2000/nchc-marketplace
          token: ${{ secrets.MARKETPLACE_PAT }}
          path: marketplace

      - name: Update marketplace.json
        run: |
          cd marketplace
          jq --arg ver "${{ steps.meta.outputs.version }}" \
             --arg desc "${{ steps.meta.outputs.description }}" \
             '.plugins[0].version = $ver | .plugins[0].description = $desc' \
             .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json

      - name: Create PR
        run: |
          cd marketplace
          VERSION="${{ steps.meta.outputs.version }}"
          BRANCH="auto/sync-v${VERSION}"
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json

          # Skip if neither version nor description changed
          if git diff --cached --quiet; then
            echo "marketplace.json already up to date (version and description match), skipping."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync plugin version to v${VERSION}"
          git push origin "$BRANCH"

          TAG="${{ github.event.release.tag_name }}"
          SHA="${{ github.sha }}"
          if [ -n "$TAG" ]; then
            BODY="Automated sync from [nchc-cluster-skills ${TAG}](https://github.com/whats2000/nchc-cluster-skills/releases/tag/${TAG})."
          elif [ "${{ github.event_name }}" = "push" ]; then
            BODY="Automated sync from nchc-cluster-skills v${VERSION} (plugin.json push on main, [${SHA:0:7}](https://github.com/whats2000/nchc-cluster-skills/commit/${SHA}))."
          else
            BODY="Automated sync from nchc-cluster-skills v${VERSION} (manual trigger)."
          fi

          gh pr create \
            --repo whats2000/nchc-marketplace \
            --title "chore: sync plugin version to v${VERSION}" \
            --body "$BODY" \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_PAT }}
